<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Fatura | Sistema de Energia</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 { margin-top: 0; font-weight: 500; letter-spacing: -0.5px; }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
        }

        input[type="file"] { display: none; }
        
        .btn-custom {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            pointer-events: none; /* Deixa o clique passar para a label */
        }

        #resultado {
            margin-top: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            display: none;
            text-align: left;
        }

        .metric {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Análise de Viabilidade</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px;">Faça o upload da fatura em PDF</p>
        
        <label class="upload-area">
            <input type="file" id="pdfInput" accept="application/pdf">
            <div class="btn-custom">Selecionar Arquivo</div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 15px;" id="fileName">Nenhum arquivo selecionado</p>
        </label>

        <div id="resultado">
            <div class="metric">Consumo Encontrado</div>
            <div class="value" id="resConsumo">-- kWh</div>
            
            <div class="metric">Custo Estimado da Usina</div>
            <div class="value" id="resCusto">R$ --</div>
        </div>
    </div>

    <script>
        // Configura o worker do PDF.js
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const fileInput = document.getElementById('pdfInput');
        const fileNameDisplay = document.getElementById('fileName');
        const resultadoDiv = document.getElementById('resultado');
        const resConsumo = document.getElementById('resConsumo');
        const resCusto = document.getElementById('resCusto');

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            fileNameDisplay.textContent = "Lendo arquivo: " + file.name;
            resultadoDiv.style.display = "none";

            const fileReader = new FileReader();

            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);

                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";

                    // Lê todas as páginas do PDF
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(" ");
                        fullText += pageText + " ";
                    }

                    // Regex ajustada para o Javascript
                    const regex = /ENERGIA ATIVA.*?1[.,]000000\s*(\d+)/i;
                    const match = fullText.match(regex);

                    if (match && match[1]) {
                        const consumo = parseInt(match[1]);
                        const custo = (consumo * 1.162438) + 21.06;

                        resConsumo.textContent = consumo + " kWh";
                        // Formata para a moeda real
                        resCusto.textContent = custo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                        resultadoDiv.style.display = "block";
                        fileNameDisplay.textContent = "Processamento concluído!";
                    } else {
                        alert("Não foi possível encontrar o consumo de Energia Ativa nesta fatura.");
                        fileNameDisplay.textContent = "Falha na leitura.";
                    }

                } catch (error) {
                    console.error(error);
                    alert("Erro ao processar o PDF.");
                }
            };

            fileReader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
